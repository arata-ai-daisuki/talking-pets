version: 2

goal:
  title: "Talking Pets 日本語HQ"
  slug: "talking-pets-hq-japanese"
  kind: existing_plan
  tranche: "継続運用: 完了済みの波を履歴化し、次の作業とMaster判断を日本語で追う。"
  status: active
  oracle:
    signal: "看板上で、現在のactive task、完了済みreceipt、次のMaster判断が日本語で分かる。"
    cadence: "各作業カード完了時と、Master判断が必要になった時"
    final_proof: "初期公開、ユーザー獲得、レイテンシ改善、provider方針の一区切りをMasterが承認する。"
  intake:
    original_request: "全部をゴールにして、GoalBuddy看板を日本語で追いたい。"
    interpreted_outcome: "短期ボードを完了で閉じても、HQ看板は継続activeとして次作業を示す。"
    input_shape: existing_plan
    audience: "ARATA"
    authority: requested
    proof_type: artifact
    completion_proof: "日本語HQ看板がactiveで、次の作業と判断ゲートが見える。"
    likely_misfire: "小さな波の完了を、全体ゴール完了と誤解させる。"
    blind_spots_considered:
      - "GoalBuddy表示が英語中心で追いづらい"
      - "完了済みボードが多く、現在地が分かりにくい"
      - "公開outreachを自動化してしまうリスク"
      - "sherpa-onnx実装に依存追加やmodel downloadが必要なこと"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "http://goalbuddy.localhost:41737/talking-pets-hq-japanese/"
    command: "npx goalbuddy board <repo>/docs/goals/talking-pets-hq-japanese"

