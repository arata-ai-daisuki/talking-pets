<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Talking Pets demo preview</title>
  <desc id="desc">A Codex Pet style bubble is converted into a short spoken line and routed to a local TTS provider.</desc>
  <rect width="1280" height="720" fill="#f5f7fb"/>
  <rect x="96" y="82" width="1088" height="556" rx="18" fill="#ffffff" stroke="#d6dce8" stroke-width="2"/>
  <text x="142" y="150" fill="#172033" font-family="Arial, sans-serif" font-size="44" font-weight="700">Talking Pets</text>
  <text x="142" y="194" fill="#4d5a70" font-family="Arial, sans-serif" font-size="24">Codex Pet bubbles to local TTS, without patching Codex.app</text>

  <rect x="142" y="254" width="150" height="150" rx="16" fill="#ffe5ef" stroke="#f4b3ca" stroke-width="2"/>
  <text x="183" y="349" fill="#172033" font-family="Arial, sans-serif" font-size="64" font-weight="700">AI</text>

  <path d="M330 262 H950 C985 262 1012 289 1012 324 V382 C1012 417 985 444 950 444 H388 L330 486 V444 H330 C295 444 268 417 268 382 V324 C268 289 295 262 330 262 Z" fill="#ffffff" stroke="#b9c2d3" stroke-width="2"/>
  <text x="344" y="326" fill="#172033" font-family="Arial, sans-serif" font-size="28">Master, implementation is done.</text>
  <text x="344" y="370" fill="#172033" font-family="Arial, sans-serif" font-size="28">Check the demo and logs.</text>

  <rect x="142" y="512" width="310" height="70" rx="12" fill="#e9f7ef" stroke="#9bd3b4" stroke-width="2"/>
  <text x="166" y="556" fill="#1f5f3a" font-family="Arial, sans-serif" font-size="24" font-weight="700">Local TTS</text>

  <path d="M475 547 H645" stroke="#7a8798" stroke-width="5" stroke-linecap="round"/>
  <path d="M645 547 L624 532 M645 547 L624 562" stroke="#7a8798" stroke-width="5" stroke-linecap="round"/>

  <rect x="682" y="498" width="356" height="98" rx="12" fill="#172033"/>
  <text x="710" y="542" fill="#ffffff" font-family="Arial, sans-serif" font-size="22">Spoken line</text>
  <text x="710" y="575" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700">"Implementation is done."</text>

  <circle cx="1092" cy="548" r="34" fill="#ffe5ef" stroke="#f4b3ca" stroke-width="2"/>
  <path d="M1080 548 H1104 M1092 536 V560" stroke="#172033" stroke-width="5" stroke-linecap="round"/>
</svg>
