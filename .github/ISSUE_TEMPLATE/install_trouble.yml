name: Install trouble
description: Get help with setup or first run
title: "[Install]: "
labels:
  - install
body:
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "macOS 15.5 / Windows 11 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: CPU architecture
      placeholder: "arm64 / x64"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: "node v22.x.x, npm x.x.x"
    validations:
      required: true
  - type: input
    id: codex_version
    attributes:
      label: Codex Desktop / CLI version if known
      placeholder: "Codex Desktop x.y.z / Codex CLI x.y.z / unknown"
    validations:
      required: false
  - type: dropdown
    id: speech_language
    attributes:
      label: Speech-language value if audio-related
      description: Use the value passed with `--speech-language` or saved as `TALKING_PETS_SPEECH_LANGUAGE`.
      options:
        - auto
        - ja
        - en
        - ko
        - zh
        - other
        - not audio-related
    validations:
      required: false
  - type: input
    id: config_source
    attributes:
      label: Config source if audio-related
      placeholder: "installer default / presets/examples/privacy-first-say.env / custom / none"
    validations:
      required: false
  - type: textarea
    id: check_output
    attributes:
      label: Check output
      description: Paste `./check.command`, `.\check.ps1`, or `./check.sh` output. Remove private paths, conversation text, local env values, credentials, local SQLite DBs such as `state_5.sqlite`, private rollout JSONL, generated audio, local recordings, archives, macOS metadata, and downloaded model files first. Known public fixture rollout paths may remain visible as evidence. You can pipe check output through `npm run sanitize:public-output` before pasting.
      render: shell
    validations:
      required: true
  - type: textarea
    id: audio_check
    attributes:
      label: Audio path output
      description: Paste `npm run check:audio` output if sound does not play. Remove private paths, conversation text, local env values, credentials, local SQLite DBs such as `state_5.sqlite`, private rollout JSONL, generated audio, local recordings, archives, macOS metadata, and downloaded model files first. Known public fixture rollout paths may remain visible as evidence. You can pipe check output through `npm run sanitize:public-output` before pasting.
      render: shell
    validations:
      required: false
  - type: textarea
    id: blocker
    attributes:
      label: Where did setup stop?
      placeholder: "install.command / install.ps1 / install.sh, npm ci, VOICEVOX or Voicebox endpoint check, dry run, start-selected-tts..."
    validations:
      required: true
