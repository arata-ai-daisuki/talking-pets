name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use pinned npm
        run: npm install -g npm@11.6.4

      - name: Show package manager versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check:syntax

      - name: Check Node runtime features
        run: npm run check:runtime

      - name: Run unit tests
        run: npm test

      - name: Check Codex compatibility fixture
        run: npm run check:compat -- --no-state

      - name: Check audio playback path
        run: npm run check:audio

      - name: Check config and preset files
        run: npm run check:config

      - name: Check installer-generated configs
        run: npm run check:installers

      - name: Check documentation links
        run: npm run check:docs

      - name: Check platform scripts
        run: npm run check:platform-scripts

      - name: Check npm package scope
        run: npm run check:pack

      - name: Check release readiness
        run: npm run check:release

      - name: Check all local gates
        run: npm run check:all

      - name: Check public output sanitizer
        run: npm run check:sanitize

      - name: Run safe dry-run fixture
        shell: bash
        run: |
          npm run test:dry-run | tee /tmp/talking-pets-dry-run.log
          grep -F "[pet] CI dry run ready." /tmp/talking-pets-dry-run.log

      - name: Parse zsh scripts
        if: runner.os == 'macOS'
        shell: bash
        run: zsh -n install.command check.command start-selected-tts.command scripts/pet-rollout-monitor.command scripts/pet-rollout-monitor-node.command

      - name: Parse bash scripts
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh check.sh start-selected-tts.sh

      - name: Parse PowerShell scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($path in @(".\install.ps1", ".\check.ps1", ".\start-selected-tts.ps1")) {
            $parseErrors = $null
            $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $path -Raw), [ref]$parseErrors)
            if ($parseErrors) {
              $parseErrors | Format-List
              exit 1
            }
          }

      - name: Parse Swift monitor
        if: runner.os == 'macOS'
        run: swift -frontend -parse scripts/pet-rollout-monitor.swift

      - name: Check Swift CLI errors
        if: runner.os == 'macOS'
        run: npm run check:swift-cli
